---
name: Update pins

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Update flake inputs
        run: |
          nix flake update \
            nixpkgs-lock \
            cavekit-src \
            nix-lefthook-git-conflict-markers-src \
            nix-lefthook-git-no-local-paths-src \
            nix-lefthook-markdownlint-src \
            nix-lefthook-missing-final-newline-src \
            nix-lefthook-nix-no-embedded-shell-src \
            nix-lefthook-trailing-whitespace-src \
            nix-lefthook-statix-src
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'flake: update pinned inputs'
          title: 'flake: update pinned inputs'
          branch: update-pins
